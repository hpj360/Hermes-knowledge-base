<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史回溯 · Hermes KB</title>
  <!-- Google Fonts：衬线杂志感 + Inter 正文 + Mono 时间戳 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_tokens.css">
  <link rel="stylesheet" href="_components.css">
  <style>
    /* === 历史页专属：杂志感页眉 + 搜索栏 + 垂直时间线 === */
    body { background: linear-gradient(180deg, var(--ink-50) 0%, #fff 240px); }
    .history-main { max-width: 880px; margin: 0 auto; padding: var(--sp-8) var(--sp-6) var(--sp-16); min-height: calc(100vh - var(--nav-height)); }
    /* 页眉：金色 kicker + 衬线大标题，致敬杂志卷首 */
    .page-kicker { font-size: var(--fs-xs); letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-700); margin-bottom: var(--sp-2); }
    .page-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: var(--sp-2); border-bottom: 1px solid var(--ink-200); padding-bottom: var(--sp-4); }
    .page-head h1 { font-size: var(--fs-2xl); color: var(--brand-700); }
    .page-head .count { font-family: var(--font-mono); font-size: var(--fs-sm); color: var(--ink-400); }
    .page-sub { color: var(--ink-400); font-size: var(--fs-sm); margin-bottom: var(--sp-6); }
    /* 图例：圆点颜色含义 */
    .legend { display: flex; gap: var(--sp-4); font-size: var(--fs-xs); color: var(--ink-400); margin-bottom: var(--sp-4); }
    .legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: var(--r-full); margin-right: var(--sp-1); vertical-align: middle; }
    .legend .dot.brand { background: var(--brand-700); }
    .legend .dot.warn { background: var(--warning); }
    /* 搜索栏 */
    .search-bar { display: flex; gap: var(--sp-3); align-items: center; margin-bottom: var(--sp-8); }
    .search-bar .input { flex: 1; }
    .search-bar .select { width: auto; min-width: 140px; }
    /* 关键词高亮：暖金背景，致敬杂志重点标注 */
    mark { background: var(--highlight); color: inherit; padding: 0 2px; border-radius: var(--r-sm); }
    /* 时间线：左侧轴线由伪元素绘制，圆点节点叠于轴上 */
    .timeline { position: relative; padding-left: var(--sp-8); }
    .timeline::before { content: ""; position: absolute; left: 7px; top: 8px; bottom: 8px; width: 2px; background: linear-gradient(var(--gold-500), var(--ink-200)); }
    .tl-item { position: relative; margin-bottom: var(--sp-8); transition: transform var(--duration-fast) var(--ease-out); }
    .tl-item:hover { transform: translateX(4px); }
    .tl-item::before { content: ""; position: absolute; left: calc(-1 * var(--sp-8) + 1px); top: 4px; width: 14px; height: 14px; border-radius: var(--r-full); background: var(--brand-700); border: 3px solid var(--gold-300); box-shadow: 0 0 0 3px #fff; }
    .tl-item.low::before { background: var(--warning); }
    .tl-time { font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--ink-400); letter-spacing: 0.02em; }
    .tl-q { font-family: var(--font-serif); font-weight: 600; font-size: var(--fs-lg); color: var(--ink-900); margin: var(--sp-1) 0 var(--sp-2); }
    .tl-a { color: var(--ink-600); font-size: var(--fs-sm); line-height: 1.7; }
    .tl-meta { display: flex; align-items: center; gap: var(--sp-3); margin-top: var(--sp-2); font-size: var(--fs-xs); }
    .tl-meta .conf { font-family: var(--font-mono); color: var(--ink-400); }
  </style>
</head>
<body data-page="history">
  <main class="history-main">
    <!-- 页眉：卷首式标题 -->
    <div class="page-kicker">Archive · 历史回溯</div>
    <div class="page-head">
      <h1 class="serif">问答编年</h1>
      <span class="count" id="resultCount">共 6 条记录</span>
    </div>
    <p class="page-sub">回溯每一次与酒类知识库的对话——按关键词或时间范围检索，定位那段被遗忘的品鉴笔记。</p>

    <!-- 图例：圆点颜色含义 -->
    <div class="legend">
      <span><i class="dot brand"></i>常规置信</span>
      <span><i class="dot warn"></i>低置信（&lt; 0.70）</span>
    </div>

    <!-- 顶部搜索栏：关键词（预填"威士忌"） + 时间范围 + 搜索按钮 -->
    <div class="search-bar">
      <input class="input" id="kw" type="text" value="威士忌" placeholder="搜索问题、引用文档、标签…">
      <select class="select" id="range">
        <option value="all">全部时间</option>
        <option value="7">近 7 天</option>
        <option value="30">近 30 天</option>
      </select>
      <button class="btn-primary" onclick="doSearch()">搜索</button>
    </div>

    <!-- 时间线容器：由 renderList 注入；无匹配时切换为 .empty-state -->
    <div id="timelineBox"></div>
  </main>

  <script>
    /* 历史问答数据：时间戳/问题/答案摘要/引用数/置信度/低置信标记/距今天数 */
    var RECORDS = [
      { ts: '2026-07-22 09:14', ago: 0, q: '波本威士忌和苏格兰威士忌有什么区别？', a: '主要差异在原料、产地与风味：波本须以≥51%玉米为基底且用新橡木桶，呈香草焦糖甜；苏格兰威士忌以麦芽为主，多用旧桶，泥煤与海盐气息更显著。', cite: 3, conf: 0.92, low: false },
      { ts: '2026-07-19 16:42', ago: 3, q: '日本威士忌的"水楢木桶"陈酿会带来什么特殊风味？', a: '水楢木稀有且孔隙较粗，长时间熟成会析出独特的椰香、檀香与寺院气息，被认为是日威的标志性风味来源。', cite: 2, conf: 0.68, low: true },
      { ts: '2026-07-14 11:05', ago: 8, q: '单一麦芽威士忌与调和威士忌孰优？', a: '二者是风格取向而非高下之分：单一麦芽突出单一酒厂个性，调和威士忌追求平衡与稳定，各有其受众与适用场景。', cite: 4, conf: 0.85, low: false },
      { ts: '2026-07-07 20:31', ago: 15, q: '威士忌的"泥煤味"从何而来？', a: '泥煤味源自发芽大麦的烘干阶段：燃烧泥煤加热麦芽，烟雾中的酚类附着于麦壳，蒸馏后保留入酒，ppm 值衡量其浓度。', cite: 3, conf: 0.91, low: false },
      { ts: '2026-06-30 14:18', ago: 22, q: '雪莉桶陈酿的威士忌为何偏甜？', a: '雪莉桶内壁残留雪莉酒的糖分与氧化干果香，陈酿中持续渗入酒液，赋予焦糖、葡萄干与无花果的甜美尾韵。', cite: 2, conf: 0.58, low: true },
      { ts: '2026-06-12 10:07', ago: 40, q: '如何在家品鉴一杯单一桶威士忌？', a: '选用郁金香杯聚香，先观色再闻香，入口含数秒感受质地；可滴入几滴纯净水"打开"风味，分层记录层次变化。', cite: 5, conf: 0.88, low: false }
    ];

    /* 关键词高亮：先转义 HTML，再用 <mark>（背景 var(--highlight)）包裹命中片段 */
    function hl(text, kw) {
      var esc = text.replace(/[&<>]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]; });
      if (!kw) return esc;
      var re = new RegExp('(' + kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
      return esc.replace(re, '<mark>$1</mark>');
    }

    /* doSearch：按关键词 + 时间范围过滤 → 重建高亮 → 空状态切换 */
    function doSearch() {
      var kw = document.getElementById('kw').value.trim();
      var range = document.getElementById('range').value;
      var box = document.getElementById('timelineBox');
      var list = RECORDS.filter(function (r) {
        var kwHit = !kw || (r.q + r.a).toLowerCase().indexOf(kw.toLowerCase()) >= 0;
        var rangeHit = range === 'all' || r.ago <= parseInt(range, 10);
        return kwHit && rangeHit;
      });
      if (!list.length) {
        box.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">未找到匹配的历史问答，换个关键词或放宽时间范围试试。</div></div>';
        document.getElementById('resultCount').textContent = '共 0 条记录';
        return;
      }
      document.getElementById('resultCount').textContent = '共 ' + list.length + ' 条记录';
      var html = '<div class="timeline">';
      list.forEach(function (r) {
        var lowMark = r.low ? ' <span class="low-confidence">· 低置信</span>' : '';
        html += '<div class="tl-item' + (r.low ? ' low' : '') + '">' +
          '<div class="tl-time">' + r.ts + '</div>' +
          '<div class="tl-q">' + hl(r.q, kw) + '</div>' +
          '<div class="tl-a">' + hl(r.a, kw) + '</div>' +
          '<div class="tl-meta"><span class="tag tag-gold">引用 ' + r.cite + ' 篇</span>' +
          '<span class="conf">置信度 ' + r.conf.toFixed(2) + '</span>' + lowMark + '</div>' +
          '</div>';
      });
      box.innerHTML = html + '</div>';
    }
    /* 回车触发搜索；时间范围变更即时过滤 */
    document.getElementById('kw').addEventListener('keydown', function (e) { if (e.key === 'Enter') doSearch(); });
    document.getElementById('range').addEventListener('change', doSearch);
    /* 初始渲染：预填"威士忌"即高亮全部命中 */
    doSearch();
  </script>
  <script src="_nav.js"></script>
</body>
</html>
