# Alembic 配置 — Hermes KB
#
# 说明：
# - sqlalchemy.url 仅为占位符，运行时由 migrations/env.py 从
#   hermes_kb.config.get_settings().db_url 覆盖（统一配置源，避免硬编码）。
# - script_location 指向包内 migrations 目录（从项目根运行 `alembic` 命令时生效）。
# - prepend_sys_path = src 确保 env.py 中 `import hermes_kb.*` 可用（未安装亦可在
#   项目根直接运行 `alembic upgrade head`）。

[alembic]
script_location = src/hermes_kb/migrations
prepend_sys_path = src
path_separator = os
version_path_separator = os
timezone = UTC
# 版本文件命名：0001_initial_schema.py（可读 + 有序）
file_template = %%(rev)s_%%(slug)s

# 占位符 —— env.py 运行时覆盖
sqlalchemy.url = sqlite:///placeholder.db

[post_write_hooks]
# 如需格式化可在此接入 ruff/black，暂留空

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
